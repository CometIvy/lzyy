<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>我的音乐站</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="bg"></div>

<div class="player">
  <div class="cover">
    <img id="cover" src="demo.jpg">
  </div>

  <div class="info">
    <h2 id="title">歌曲名</h2>
    <p id="artist">歌手</p>
  </div>

  <audio id="audio" controls autoplay></audio>

  <ul id="playlist"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
